<!DOCTYPE html>
<html>
<head>
  <title>первая кампания</title>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
  <style>
    html, body, #map { width: 100%; height: 100%; margin: 0; padding: 0; background: #fff; }
    #slider { position: absolute; top: 20px; right: 20px; z-index: 1000; }
  </style>
</head>
<body>
<div id="map"></div>
<input id="slider" type="range" min="0" max="1" step="0.01" value="1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
  var mapExtent = [0.00000000, -4500.00000000, 8000.00000000, 0.00000000];
  var mapMinZoom = 0;
  var mapMaxZoom = 5;
  var mapMaxResolution = 1.00000000;
  var tileExtent = [0.00000000, -4500.00000000, 8000.00000000, 0.00000000];

  var crs = L.CRS.Simple;
  crs.transformation = new L.Transformation(1, -tileExtent[0], -1, tileExtent[3]);
  crs.scale = function(zoom) {
    return Math.pow(2, zoom) / mapMaxResolution;
  };
  crs.zoom = function(scale) {
    return Math.log(scale * mapMaxResolution) / Math.LN2;
  };

  var map = L.map('map', {
    crs: crs,
    minZoom: mapMinZoom,
    maxZoom: mapMaxZoom,
    zoomSnap: 0.5,
    zoomDelta: 0.5,
    wheelPxPerZoomLevel: 120,
    maxBoundsViscosity: 1.0
  });

  var baseTileUrl = 'https://suddenufo.github.io/map/{z}/{x}/{y}.webp';
  var tileLayer = L.tileLayer(baseTileUrl, {
    minZoom: mapMinZoom,
    maxZoom: mapMaxZoom,
    attribution: '<a href="https://www.maptiler.com/engine/">Rendered with MapTiler Engine</a>, non-commercial use only',
    noWrap: true,
    tms: false
  }).addTo(map);

  var bounds = [
    crs.unproject(L.point(mapExtent[2], mapExtent[3])),
    crs.unproject(L.point(mapExtent[0], mapExtent[1]))
  ];
  map.fitBounds(bounds);
  map.setMaxBounds(bounds);

  var slider = document.getElementById('slider');
  slider.oninput = function() {
    tileLayer.setOpacity(this.value);
  };
</script>
</body>
</html>
